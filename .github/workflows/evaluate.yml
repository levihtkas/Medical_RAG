name: Rag Pipeline Evaluation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Cache vector store and embedding cache
        uses: actions/cache@v4
        with:
          path: |
            data/vector_store
            data/embedding_cache.json
          key: ${{ runner.os }}-rag-vectordb-${{ hashFiles('data/synthetic_medication_data.json', 'src/ingest_db.py', 'src/config.py') }}
          restore-keys: |
            ${{ runner.os }}-rag-vectordb-
      - name: Ingest Test Data (Vector DB & BM25)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_STORE_PATH: ./data/vector_store
          EMBEDDING_CACHE_PATH: ./data/embedding_cache.json
          COLLECTION_NAME: medical_data_collection
        run: |
          mkdir -p data/vector_store
          touch data/embedding_cache.json
          python src/ingest_db.py
      # -------------------------
      - name: Run evaluation script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_STORE_PATH: ./data/vector_store
          EMBEDDING_CACHE_PATH: ./data/embedding_cache.json
          COLLECTION_NAME: medical_data_collection
          RETRIEVAL_TOP_K: '5'
          EVAL_MAX_QUESTIONS: '5'
          GRADER_MODEL: gpt-4o-mini
        run: |
          python tests/evaluate.py
